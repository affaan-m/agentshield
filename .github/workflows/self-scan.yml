name: AgentShield Self-Scan

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "tests/**"
      - "examples/**"
      - "action.yml"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/self-scan.yml"
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "tests/**"
      - "examples/**"
      - "action.yml"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/self-scan.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  self-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run AgentShield on itself
        uses: ./
        with:
          path: "."
          min-severity: "medium"
          fail-on-findings: false
